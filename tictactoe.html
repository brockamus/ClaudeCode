<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; color: #eee;
    flex-direction: column; gap: 24px;
  }
  h1 { font-size: 2rem; letter-spacing: 2px; }
  .status {
    font-size: 1.25rem; min-height: 2rem;
    transition: color 0.2s;
  }
  .status.win { color: #4ecca3; font-weight: bold; }
  .status.draw { color: #f0a500; font-weight: bold; }
  .board {
    display: grid; grid-template-columns: repeat(3, 120px);
    grid-template-rows: repeat(3, 120px); gap: 6px;
  }
  .cell {
    background: #16213e; border: 2px solid #0f3460;
    font-size: 3rem; font-weight: bold; cursor: pointer;
    display: flex; justify-content: center; align-items: center;
    border-radius: 8px; transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .cell:hover:not(.taken) { background: #1a2a50; transform: scale(1.04); }
  .cell.x { color: #e94560; }
  .cell.o { color: #4ecca3; }
  .cell.win-cell { background: #0f3460; animation: pulse 0.6s ease-in-out infinite alternate; }
  @keyframes pulse { to { background: #1a4a80; } }
  button {
    padding: 10px 28px; font-size: 1rem; border: none;
    background: #e94560; color: #fff; border-radius: 6px;
    cursor: pointer; letter-spacing: 1px; transition: background 0.2s;
  }
  button:hover { background: #c73652; }
  .score {
    display: flex; gap: 32px; font-size: 1.1rem;
  }
  .score span { opacity: 0.7; }
  .score .x-score { color: #e94560; }
  .score .o-score { color: #4ecca3; }
</style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="score">
    <div class="x-score">X: <strong id="xWins">0</strong></div>
    <span>|</span>
    <div>Draws: <strong id="draws">0</strong></div>
    <span>|</span>
    <div class="o-score">O: <strong id="oWins">0</strong></div>
  </div>
  <div class="status" id="status">X's turn</div>
  <div class="board" id="board"></div>
  <button id="reset">New Game</button>

<script>
  const board = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');
  const xWinsEl = document.getElementById('xWins');
  const oWinsEl = document.getElementById('oWins');
  const drawsEl = document.getElementById('draws');

  let cells, turn, gameOver, scores = { X: 0, O: 0, D: 0 };

  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function init() {
    board.innerHTML = '';
    cells = Array(9).fill('');
    turn = 'X';
    gameOver = false;
    statusEl.className = 'status';
    statusEl.textContent = "X's turn";
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.i = i;
      cell.addEventListener('click', handleClick);
      board.appendChild(cell);
    }
  }

  function handleClick(e) {
    const i = +e.target.dataset.i;
    if (gameOver || cells[i]) return;
    cells[i] = turn;
    const el = e.target;
    el.textContent = turn;
    el.classList.add(turn.toLowerCase(), 'taken');

    const winLine = checkWin(turn);
    if (winLine) {
      gameOver = true;
      statusEl.textContent = `${turn} wins!`;
      statusEl.className = 'status win';
      scores[turn]++;
      updateScores();
      winLine.forEach(idx => board.children[idx].classList.add('win-cell'));
      return;
    }
    if (cells.every(c => c)) {
      gameOver = true;
      statusEl.textContent = "It's a draw!";
      statusEl.className = 'status draw';
      scores.D++;
      updateScores();
      return;
    }
    turn = turn === 'X' ? 'O' : 'X';
    statusEl.textContent = `${turn}'s turn`;
  }

  function checkWin(player) {
    for (const line of WINS) {
      if (line.every(i => cells[i] === player)) return line;
    }
    return null;
  }

  function updateScores() {
    xWinsEl.textContent = scores.X;
    oWinsEl.textContent = scores.O;
    drawsEl.textContent = scores.D;
  }

  resetBtn.addEventListener('click', init);
  init();
</script>
</body>
</html>
