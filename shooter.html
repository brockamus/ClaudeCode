<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON SURVIVOR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
body {
  display: flex; justify-content: center; align-items: center;
  font-family: monospace;
}
#wrap {
  position: relative;
  width: 800px; height: 600px;
}
canvas {
  display: block;
  width: 100%; height: 100%;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
/* CRT scanline overlay */
#scanlines {
  pointer-events: none;
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  z-index: 2;
}
/* CRT vignette */
#vignette {
  pointer-events: none;
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
  z-index: 3;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
</div>
<script>
// ============================================================
// NEON SURVIVOR — 2D Retro Top-Down Arena Shooter
// ============================================================
(function() {
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// ---- Resize to fill viewport ----
function resize() {
  const wrap = document.getElementById('wrap');
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  wrap.style.width = (W * scale) + 'px';
  wrap.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ---- Input ----
const keys = {};
const mouse = { x: W / 2, y: H / 2, down: false };

let paused = false;
let muted = false;

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'escape' && state === 'playing') {
    paused = !paused;
    e.preventDefault();
    return;
  }
  if (k === 'm') {
    muted = !muted;
    e.preventDefault();
    return;
  }
  keys[k] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / rect.width * W;
  mouse.y = (e.clientY - rect.top) / rect.height * H;
});
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    // Check mute button click (top-right corner, 30x30)
    const muteX = W - 40, muteY = 40;
    if (mouse.x >= muteX - 15 && mouse.x <= muteX + 15 &&
        mouse.y >= muteY - 15 && mouse.y <= muteY + 15) {
      muted = !muted;
      return;
    }
    mouse.down = true;
  }
});
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ---- Audio (Web Audio API, procedural) ----
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (muted) return;
  ensureAudio();
  const ac = audioCtx;
  const now = ac.currentTime;
  const master = ac.createGain();
  master.gain.value = 0.3;
  master.connect(ac.destination);

  if (type === 'shoot') {
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.linearRampToValueAtTime(200, now + 0.08);
    g.gain.setValueAtTime(0.4, now);
    g.gain.linearRampToValueAtTime(0, now + 0.08);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now + 0.08);
  }
  else if (type === 'enemyHit') {
    const bufSize = ac.sampleRate * 0.05;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1500; bp.Q.value = 2;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.5, now);
    g.gain.linearRampToValueAtTime(0, now + 0.05);
    src.connect(bp); bp.connect(g); g.connect(master);
    src.start(now); src.stop(now + 0.05);
  }
  else if (type === 'enemyDeath') {
    const osc = ac.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.linearRampToValueAtTime(60, now + 0.15);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.4, now);
    g.gain.linearRampToValueAtTime(0, now + 0.15);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now + 0.15);
    // noise layer
    const bufSize = ac.sampleRate * 0.1;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const g2 = ac.createGain();
    g2.gain.setValueAtTime(0.3, now);
    g2.gain.linearRampToValueAtTime(0, now + 0.15);
    src.connect(g2); g2.connect(master);
    src.start(now); src.stop(now + 0.15);
  }
  else if (type === 'playerHurt') {
    const osc = ac.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.linearRampToValueAtTime(100, now + 0.2);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.4, now);
    g.gain.linearRampToValueAtTime(0, now + 0.2);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now + 0.2);
  }
  else if (type === 'waveAnnounce') {
    [440, 554, 659].forEach((freq, i) => {
      const osc = ac.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, now + i * 0.12);
      g.gain.linearRampToValueAtTime(0.4, now + i * 0.12 + 0.02);
      g.gain.linearRampToValueAtTime(0, now + i * 0.12 + 0.15);
      osc.connect(g); g.connect(master);
      osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.15);
    });
  }
  else if (type === 'gameOver') {
    [523, 392, 262].forEach((freq, i) => {
      const osc = ac.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, now + i * 0.2);
      g.gain.linearRampToValueAtTime(0.35, now + i * 0.2 + 0.03);
      g.gain.linearRampToValueAtTime(0, now + i * 0.2 + 0.3);
      osc.connect(g); g.connect(master);
      osc.start(now + i * 0.2); osc.stop(now + i * 0.2 + 0.3);
    });
  }
  else if (type === 'enemyShoot') {
    const osc = ac.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.linearRampToValueAtTime(250, now + 0.1);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.25, now);
    g.gain.linearRampToValueAtTime(0, now + 0.1);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now + 0.1);
  }
}

// ---- Particles ----
let particles = [];

function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (Math.random() * 0.5 + 0.5) * speed;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: life * (0.5 + Math.random() * 0.5),
      maxLife: life,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    const s = p.size * alpha;
    ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
  }
  ctx.globalAlpha = 1;
}

// ---- Screen Shake ----
let shakeX = 0, shakeY = 0, shakeIntensity = 0, shakeDuration = 0, shakeTimer = 0;

function startShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeDuration = duration;
  shakeTimer = duration;
}

function updateShake(dt) {
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    const t = shakeTimer / shakeDuration;
    shakeX = (Math.random() * 2 - 1) * shakeIntensity * t;
    shakeY = (Math.random() * 2 - 1) * shakeIntensity * t;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

// ---- Damage Flash ----
let damageFlashTimer = 0;

// ---- Starfield (menu background) ----
const stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    speed: 20 + Math.random() * 60,
    size: 1 + Math.random() * 2,
    brightness: 0.3 + Math.random() * 0.7
  });
}

function updateStarfield(dt) {
  for (const s of stars) {
    s.y += s.speed * dt;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }
}

function drawStarfield() {
  for (const s of stars) {
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

// ---- Leaderboard (localStorage) ----
const LB_KEY = 'neonSurvivorHighScores';
function loadHighScores() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
  catch { return []; }
}
function saveHighScores(scores) {
  localStorage.setItem(LB_KEY, JSON.stringify(scores));
}
function addHighScore(initials, sc, wv) {
  const scores = loadHighScores();
  scores.push({ initials, score: sc, wave: wv });
  scores.sort((a, b) => b.score - a.score);
  if (scores.length > 10) scores.length = 10;
  saveHighScores(scores);
  return scores;
}
function isHighScore(sc) {
  const scores = loadHighScores();
  return scores.length < 10 || sc > (scores[scores.length - 1]?.score || 0);
}

// ---- Initials Entry State ----
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
let initials = [0, 0, 0]; // indices into ALPHABET
let initialsCursor = 0;    // which letter (0-2) is selected
let initialsBlinkTimer = 0;
let initialsConfirmed = false;
let leaderboardScores = [];
let inputCooldown = 0; // prevent rapid key repeat

// ---- Game State ----
let state = 'menu'; // menu, playing, gameover, enterInitials, leaderboard
let score = 0;
let wave = 0;
let waveState = 'announcing'; // announcing, active, cooldown
let waveTimer = 0;
let enemiesSpawned = 0;
let enemiesInWave = 0;
let spawnTimer = 0;
let cooldownTimer = 0;

// ---- Player ----
const player = {
  x: W / 2, y: H / 2,
  w: 20, h: 20,
  speed: 180,
  hp: 100, maxHp: 100,
  gunAngle: 0,
  shootCooldown: 0,
  shootCooldownMax: 0.15,
  invulnTimer: 0,
  invulnDuration: 0.8,
  animFrame: 0,
  animTimer: 0,
  moving: false
};

// ---- Power-ups ----
let powerups = [];
const POWERUP_DEFS = {
  health:    { color: '#33ff33', icon: '+', duration: 0, desc: 'HEALTH' },
  rapidfire: { color: '#ffff33', icon: 'R', duration: 8, desc: 'RAPID FIRE' },
  shield:    { color: '#3399ff', icon: 'S', duration: 6, desc: 'SHIELD' },
  speed:     { color: '#ff9933', icon: 'V', duration: 7, desc: 'SPEED BOOST' },
  spread:    { color: '#ff33ff', icon: 'W', duration: 8, desc: 'SPREAD SHOT' },
  pierce:    { color: '#33ffff', icon: 'P', duration: 8, desc: 'PIERCING' }
};
const POWERUP_TYPES = Object.keys(POWERUP_DEFS);
const POWERUP_DROP_CHANCE = 0.25;

// Active power-up timers
let activePowerups = {};
let powerupFlashMsg = '';
let powerupFlashTimer = 0;

function resetPowerups() {
  activePowerups = {};
  powerups = [];
  powerupFlashMsg = '';
  powerupFlashTimer = 0;
}

function spawnPowerup(x, y) {
  if (Math.random() > POWERUP_DROP_CHANCE) return;
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerups.push({
    x, y, w: 16, h: 16,
    type,
    bobTimer: Math.random() * Math.PI * 2,
    life: 10 // despawn after 10 seconds
  });
}

function activatePowerup(type) {
  const def = POWERUP_DEFS[type];
  if (type === 'health') {
    player.hp = Math.min(player.maxHp, player.hp + 30);
    spawnParticles(player.x, player.y, '#33ff33', 10, 80, 0.4);
  } else {
    activePowerups[type] = def.duration;
    spawnParticles(player.x, player.y, def.color, 12, 100, 0.3);
  }
  powerupFlashMsg = def.desc;
  powerupFlashTimer = 1.5;
  playSound('waveAnnounce');
}

function hasPowerup(type) {
  return (activePowerups[type] || 0) > 0;
}

function updatePowerups(dt) {
  // Tick active timers
  for (const type in activePowerups) {
    activePowerups[type] -= dt;
    if (activePowerups[type] <= 0) delete activePowerups[type];
  }
  // Tick pickup flash
  if (powerupFlashTimer > 0) powerupFlashTimer -= dt;
  // Update pickups on ground
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.bobTimer += dt * 3;
    p.life -= dt;
    if (p.life <= 0) { powerups.splice(i, 1); continue; }
    // Collision with player
    if (aabb({ x: p.x, y: p.y, w: p.w, h: p.h }, player)) {
      activatePowerup(p.type);
      powerups.splice(i, 1);
    }
  }
}

function drawPowerupIcon(cx, cy, type, color, scale) {
  const s = scale || 1;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;

  if (type === 'health') {
    // Red cross / plus sign
    ctx.fillRect(-2, -6, 4, 12);
    ctx.fillRect(-6, -2, 12, 4);
  }
  else if (type === 'shield') {
    // Shield shape
    ctx.beginPath();
    ctx.moveTo(0, -7);
    ctx.lineTo(6, -4);
    ctx.lineTo(6, 1);
    ctx.quadraticCurveTo(6, 6, 0, 8);
    ctx.quadraticCurveTo(-6, 6, -6, 1);
    ctx.lineTo(-6, -4);
    ctx.closePath();
    ctx.stroke();
    ctx.globalAlpha = 0.3;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  else if (type === 'speed') {
    // Lightning bolt
    ctx.beginPath();
    ctx.moveTo(2, -7);
    ctx.lineTo(-2, -1);
    ctx.lineTo(1, -1);
    ctx.lineTo(-2, 7);
    ctx.lineTo(4, 0);
    ctx.lineTo(1, 0);
    ctx.closePath();
    ctx.fill();
  }
  else if (type === 'rapidfire') {
    // Three bullets / fast lines
    ctx.fillRect(-5, -5, 7, 2);
    ctx.fillRect(-3, -1, 7, 2);
    ctx.fillRect(-5, 3, 7, 2);
    // Arrow tips
    ctx.beginPath();
    ctx.moveTo(2, -6); ctx.lineTo(5, -4); ctx.lineTo(2, -2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4, -2); ctx.lineTo(7, 0); ctx.lineTo(4, 2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2, 2); ctx.lineTo(5, 4); ctx.lineTo(2, 6); ctx.fill();
  }
  else if (type === 'spread') {
    // Three-way fan / spread arrows
    ctx.lineWidth = 2;
    // Center
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(7, 0); ctx.stroke();
    // Up
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(6, -5); ctx.stroke();
    // Down
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(6, 5); ctx.stroke();
    // Arrowheads
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.moveTo(7, 0); ctx.lineTo(4, -2); ctx.lineTo(4, 2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(6, -5); ctx.lineTo(3, -4); ctx.lineTo(4, -7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(6, 5); ctx.lineTo(3, 4); ctx.lineTo(4, 7); ctx.fill();
  }
  else if (type === 'pierce') {
    // Arrow piercing through
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(7, 0); ctx.stroke();
    // Arrowhead
    ctx.beginPath(); ctx.moveTo(7, 0); ctx.lineTo(3, -3); ctx.lineTo(3, 3); ctx.closePath(); ctx.fill();
    // Pierced bars
    ctx.strokeStyle = color;
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-2, -5); ctx.lineTo(-2, 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, -5); ctx.lineTo(2, 5); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawPowerups() {
  for (const p of powerups) {
    const def = POWERUP_DEFS[p.type];
    const bob = Math.sin(p.bobTimer) * 3;
    const py = p.y + bob;
    // Blinking when about to despawn
    if (p.life < 3 && Math.floor(p.life * 5) % 2 === 0) continue;
    // Glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = def.color;
    ctx.fillRect(p.x - 12, py - 12, 24, 24);
    ctx.globalAlpha = 1;
    // Box
    ctx.fillStyle = '#111';
    ctx.fillRect(p.x - 10, py - 10, 20, 20);
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(p.x - 10, py - 10, 20, 20);
    // Icon shape
    drawPowerupIcon(p.x, py, p.type, def.color, 1);
  }
}

function drawActivePowerupTimers() {
  const active = Object.entries(activePowerups);
  if (active.length === 0) return;
  const startY = 50;
  for (let i = 0; i < active.length; i++) {
    const [type, time] = active[i];
    const def = POWERUP_DEFS[type];
    const y = startY + i * 22;
    // Icon
    drawPowerupIcon(25, y - 3, type, def.color, 0.7);
    // Label
    ctx.font = '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = def.color;
    ctx.fillText(def.desc, 38, y);
    // Timer bar
    const ratio = time / def.duration;
    ctx.fillStyle = '#222';
    ctx.fillRect(120, y - 8, 50, 6);
    ctx.fillStyle = def.color;
    ctx.fillRect(120, y - 8, 50 * ratio, 6);
  }
}

function drawPowerupFlash() {
  if (powerupFlashTimer <= 0) return;
  const alpha = Math.min(1, powerupFlashTimer);
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(powerupFlashMsg + '!', W / 2, H / 2 + 60);
  ctx.globalAlpha = 1;
}

// ---- Bullets ----
let playerBullets = [];
let enemyBullets = [];

// ---- Enemies ----
let enemies = [];

// ---- AABB Collision ----
function aabb(a, b) {
  return a.x - a.w / 2 < b.x + b.w / 2 &&
         a.x + a.w / 2 > b.x - b.w / 2 &&
         a.y - a.h / 2 < b.y + b.h / 2 &&
         a.y + a.h / 2 > b.y - b.h / 2;
}

// ---- Spawn enemy from edge ----
function spawnEnemy(type) {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * W; y = -20; }       // top
  else if (side === 1) { x = W + 20; y = Math.random() * H; } // right
  else if (side === 2) { x = Math.random() * W; y = H + 20; } // bottom
  else { x = -20; y = Math.random() * H; }                    // left

  const hpScale = 1 + (wave - 1) * 0.1;
  const spdScale = 1 + (wave - 1) * 0.03;

  const defs = {
    grunt:   { w: 18, h: 18, hp: 50, speed: 80, color: '#ff3333', score: 100 },
    fast:    { w: 14, h: 14, hp: 30, speed: 150, color: '#ff33ff', score: 150 },
    tank:    { w: 28, h: 28, hp: 150, speed: 50, color: '#ff8800', score: 250 },
    shooter: { w: 18, h: 18, hp: 60, speed: 70, color: '#aa33ff', score: 200 }
  };
  const d = defs[type];
  enemies.push({
    x, y, w: d.w, h: d.h,
    hp: d.hp * hpScale,
    maxHp: d.hp * hpScale,
    speed: d.speed * spdScale,
    color: d.color,
    type,
    scoreVal: d.score,
    shootTimer: type === 'shooter' ? 1.5 + Math.random() : 0,
    zigzagTimer: type === 'fast' ? 0 : 0,
    zigzagDir: 1,
    animTimer: 0,
    animFrame: 0
  });
}

function pickEnemyType() {
  const types = ['grunt'];
  if (wave >= 3) types.push('fast');
  if (wave >= 5) types.push('tank');
  if (wave >= 7) types.push('shooter');
  return types[Math.floor(Math.random() * types.length)];
}

// ---- Start Wave ----
function startWave() {
  wave++;
  enemiesInWave = 5 + Math.floor(wave * 1.8);
  enemiesSpawned = 0;
  spawnTimer = 0;
  waveState = 'announcing';
  waveTimer = 2;
  playSound('waveAnnounce');
}

// ---- Start Game ----
function startGame() {
  ensureAudio();
  state = 'playing';
  score = 0;
  wave = 0;
  player.x = W / 2; player.y = H / 2;
  player.hp = player.maxHp;
  player.invulnTimer = 0;
  player.shootCooldown = 0;
  playerBullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];
  resetPowerups();
  damageFlashTimer = 0;
  shakeTimer = 0;
  startWave();
}

// ---- Update Playing ----
function updatePlaying(dt) {
  // Player movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
  player.moving = dx !== 0 || dy !== 0;
  const moveSpeed = player.speed * (hasPowerup('speed') ? 1.6 : 1);
  player.x += dx * moveSpeed * dt;
  player.y += dy * moveSpeed * dt;
  // Clamp to arena
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
  player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y));

  // Walk animation
  if (player.moving) {
    player.animTimer += dt;
    if (player.animTimer > 0.15) { player.animTimer = 0; player.animFrame = 1 - player.animFrame; }
  } else {
    player.animFrame = 0;
    player.animTimer = 0;
  }

  // Gun angle
  player.gunAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Shooting
  player.shootCooldown -= dt;
  const cooldownMult = hasPowerup('rapidfire') ? 0.4 : 1;
  if (mouse.down && player.shootCooldown <= 0) {
    player.shootCooldown = player.shootCooldownMax * cooldownMult;
    const angles = [player.gunAngle];
    if (hasPowerup('spread')) {
      angles.push(player.gunAngle - 0.2, player.gunAngle + 0.2);
    }
    for (const a of angles) {
      const bx = player.x + Math.cos(a) * 14;
      const by = player.y + Math.sin(a) * 14;
      playerBullets.push({
        x: bx, y: by, w: 6, h: 3,
        vx: Math.cos(a) * 500,
        vy: Math.sin(a) * 500,
        angle: a,
        pierce: hasPowerup('pierce')
      });
    }
    // Muzzle flash
    const mx = player.x + Math.cos(player.gunAngle) * 14;
    const my = player.y + Math.sin(player.gunAngle) * 14;
    spawnParticles(mx, my, '#ffff66', 4, 120, 0.1);
    playSound('shoot');
    startShake(1.5, 0.05);
  }

  // Invulnerability
  if (player.invulnTimer > 0) player.invulnTimer -= dt;

  // Update player bullets
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10) {
      playerBullets.splice(i, 1);
    }
  }

  // Update enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10) {
      enemyBullets.splice(i, 1);
    }
  }

  // Update enemies
  for (const e of enemies) {
    const toPlayerX = player.x - e.x;
    const toPlayerY = player.y - e.y;
    const dist = Math.sqrt(toPlayerX * toPlayerX + toPlayerY * toPlayerY) || 1;
    const nx = toPlayerX / dist;
    const ny = toPlayerY / dist;

    if (e.type === 'fast') {
      // Zigzag
      e.zigzagTimer += dt;
      if (e.zigzagTimer > 0.3) { e.zigzagTimer = 0; e.zigzagDir *= -1; }
      const perpX = -ny * e.zigzagDir;
      const perpY = nx * e.zigzagDir;
      e.x += (nx * 0.7 + perpX * 0.7) * e.speed * dt;
      e.y += (ny * 0.7 + perpY * 0.7) * e.speed * dt;
    }
    else if (e.type === 'shooter') {
      if (dist > 200) {
        e.x += nx * e.speed * dt;
        e.y += ny * e.speed * dt;
      }
      e.shootTimer -= dt;
      if (e.shootTimer <= 0 && dist < 400) {
        e.shootTimer = 1.2 + Math.random() * 0.5;
        const angle = Math.atan2(toPlayerY, toPlayerX) + (Math.random() - 0.5) * 0.15;
        enemyBullets.push({
          x: e.x, y: e.y, w: 5, h: 5,
          vx: Math.cos(angle) * 200,
          vy: Math.sin(angle) * 200
        });
        playSound('enemyShoot');
      }
    }
    else {
      e.x += nx * e.speed * dt;
      e.y += ny * e.speed * dt;
    }

    // Enemy animation
    e.animTimer += dt;
    if (e.animTimer > 0.2) { e.animTimer = 0; e.animFrame = 1 - e.animFrame; }
  }

  // Collision: player bullets vs enemies
  for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
    const b = playerBullets[bi];
    const bBox = { x: b.x, y: b.y, w: 6, h: 6 };
    let bulletHit = false;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (aabb(bBox, e)) {
        e.hp -= 25;
        spawnParticles(b.x, b.y, '#ffff00', 5, 100, 0.2);
        if (e.hp <= 0) {
          score += e.scoreVal;
          spawnParticles(e.x, e.y, e.color, 15, 150, 0.4);
          spawnParticles(e.x, e.y, '#ffffff', 8, 100, 0.3);
          spawnPowerup(e.x, e.y);
          enemies.splice(ei, 1);
          playSound('enemyDeath');
          startShake(4, 0.1);
        } else {
          playSound('enemyHit');
        }
        if (!b.pierce) { bulletHit = true; break; }
      }
    }
    if (bulletHit) playerBullets.splice(bi, 1);
  }

  // Collision: enemies vs player (contact)
  if (player.invulnTimer <= 0) {
    for (const e of enemies) {
      if (aabb(player, e)) {
        const shielded = hasPowerup('shield');
        const dmg = shielded ? 5 : 15;
        player.hp -= dmg;
        player.invulnTimer = player.invulnDuration;
        if (!shielded) damageFlashTimer = 0.15;
        playSound('playerHurt');
        startShake(shielded ? 3 : 8, 0.2);
        if (shielded) spawnParticles(player.x, player.y, '#3399ff', 8, 120, 0.2);
        // Knock player away
        const kx = player.x - e.x;
        const ky = player.y - e.y;
        const kd = Math.sqrt(kx * kx + ky * ky) || 1;
        player.x += (kx / kd) * 30;
        player.y += (ky / kd) * 30;
        break;
      }
    }
  }

  // Collision: enemy bullets vs player
  if (player.invulnTimer <= 0) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      const bBox = { x: b.x, y: b.y, w: 5, h: 5 };
      if (aabb(bBox, player)) {
        enemyBullets.splice(i, 1);
        const shielded = hasPowerup('shield');
        const dmg = shielded ? 3 : 10;
        player.hp -= dmg;
        player.invulnTimer = player.invulnDuration;
        if (!shielded) damageFlashTimer = 0.15;
        playSound('playerHurt');
        startShake(shielded ? 2 : 6, 0.15);
        if (shielded) spawnParticles(player.x, player.y, '#3399ff', 6, 100, 0.2);
      }
    }
  }

  // Player death
  if (player.hp <= 0) {
    player.hp = 0;
    spawnParticles(player.x, player.y, '#00ffff', 30, 200, 0.6);
    playSound('gameOver');
    if (isHighScore(score)) {
      state = 'enterInitials';
      initials = [0, 0, 0];
      initialsCursor = 0;
      initialsConfirmed = false;
      inputCooldown = 0.3;
    } else {
      state = 'gameover';
    }
    return;
  }

  // Wave logic
  if (waveState === 'announcing') {
    waveTimer -= dt;
    if (waveTimer <= 0) waveState = 'active';
  }
  else if (waveState === 'active') {
    if (enemiesSpawned < enemiesInWave) {
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnEnemy(pickEnemyType());
        enemiesSpawned++;
        spawnTimer = 0.4 + Math.random() * 0.3;
      }
    }
    if (enemiesSpawned >= enemiesInWave && enemies.length === 0) {
      waveState = 'cooldown';
      cooldownTimer = 1.5;
    }
  }
  else if (waveState === 'cooldown') {
    cooldownTimer -= dt;
    if (cooldownTimer <= 0) startWave();
  }

  // Update effects
  updatePowerups(dt);
  updateParticles(dt);
  updateShake(dt);
  if (damageFlashTimer > 0) damageFlashTimer -= dt;
}

// ---- Drawing ----
function drawPlayer() {
  const px = player.x;
  const py = player.y;

  // Invulnerability blink
  if (player.invulnTimer > 0 && Math.floor(player.invulnTimer * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(px, py);

  // Body (chunky pixel sprite)
  ctx.fillStyle = '#00ffff';
  if (player.animFrame === 0) {
    // Frame 0: standing
    ctx.fillRect(-8, -10, 16, 20);  // body
    ctx.fillRect(-10, -6, 4, 8);    // left arm
    ctx.fillRect(6, -6, 4, 8);      // right arm
    ctx.fillStyle = '#008888';
    ctx.fillRect(-6, 10, 5, 4);     // left foot
    ctx.fillRect(1, 10, 5, 4);      // right foot
  } else {
    // Frame 1: walk
    ctx.fillRect(-8, -10, 16, 20);
    ctx.fillRect(-10, -8, 4, 8);
    ctx.fillRect(6, -4, 4, 8);
    ctx.fillStyle = '#008888';
    ctx.fillRect(-7, 10, 5, 4);
    ctx.fillRect(2, 10, 5, 6);
  }

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(-5, -8, 3, 3);
  ctx.fillRect(2, -8, 3, 3);

  ctx.restore();

  // Gun (drawn after body, rotates)
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(player.gunAngle);
  ctx.fillStyle = '#66ffff';
  ctx.fillRect(4, -2, 16, 4);
  // Gun tip
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(18, -1, 3, 2);
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  // Body
  ctx.fillStyle = e.color;
  const hw = e.w / 2;
  const hh = e.h / 2;

  if (e.type === 'grunt') {
    ctx.fillRect(-hw, -hh, e.w, e.h);
    // Angry eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(-5, -5, 3, 3);
    ctx.fillRect(2, -5, 3, 3);
    // Animation legs
    if (e.animFrame === 0) {
      ctx.fillStyle = e.color;
      ctx.fillRect(-hw - 2, hh - 4, 4, 6);
      ctx.fillRect(hw - 2, hh - 4, 4, 6);
    } else {
      ctx.fillStyle = e.color;
      ctx.fillRect(-hw, hh - 2, 4, 6);
      ctx.fillRect(hw - 4, hh - 2, 4, 6);
    }
  }
  else if (e.type === 'fast') {
    // Diamond-ish shape
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.lineTo(hw, 0);
    ctx.lineTo(0, hh);
    ctx.lineTo(-hw, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(-3, -3, 2, 2);
    ctx.fillRect(1, -3, 2, 2);
  }
  else if (e.type === 'tank') {
    ctx.fillRect(-hw, -hh, e.w, e.h);
    // Armor lines
    ctx.fillStyle = '#cc6600';
    ctx.fillRect(-hw + 2, -hh + 2, e.w - 4, 3);
    ctx.fillRect(-hw + 2, hh - 5, e.w - 4, 3);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(-7, -5, 4, 4);
    ctx.fillRect(3, -5, 4, 4);
  }
  else if (e.type === 'shooter') {
    ctx.fillRect(-hw, -hh, e.w, e.h);
    // "Gun" pointing at player
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    ctx.save();
    ctx.rotate(angle);
    ctx.fillStyle = '#8800cc';
    ctx.fillRect(hw - 2, -2, 10, 4);
    ctx.restore();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(-4, -5, 3, 3);
    ctx.fillRect(1, -5, 3, 3);
  }

  // HP bar if damaged
  if (e.hp < e.maxHp) {
    const barW = e.w + 4;
    const barH = 3;
    ctx.fillStyle = '#333';
    ctx.fillRect(-barW / 2, -hh - 8, barW, barH);
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(-barW / 2, -hh - 8, barW * (e.hp / e.maxHp), barH);
  }

  ctx.restore();
}

function drawHUD() {
  // Health bar
  const barW = 150, barH = 14;
  const barX = 15, barY = 15;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, barH);
  const hpRatio = player.hp / player.maxHp;
  let hpColor = '#33ff33';
  if (hpRatio < 0.6) hpColor = '#ffff33';
  if (hpRatio < 0.3) hpColor = '#ff3333';
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, barY, barW * hpRatio, barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP ' + Math.ceil(player.hp) + '/' + player.maxHp, barX + 4, barY + 11);

  // Wave
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaaaff';
  ctx.fillText('WAVE ' + wave, W / 2, 26);

  // Score
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffff66';
  ctx.fillText('SCORE: ' + score, W - 15, 26);

  // Shoot cooldown indicator
  if (player.shootCooldown > 0) {
    const cd = player.shootCooldown / player.shootCooldownMax;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(barX, barY + barH + 4, barW * (1 - cd), 3);
  }
}

function drawMuteButton() {
  const bx = W - 40, by = 40;
  const hover = mouse.x >= bx - 15 && mouse.x <= bx + 15 &&
                mouse.y >= by - 15 && mouse.y <= by + 15;
  ctx.save();
  ctx.translate(bx, by);
  ctx.globalAlpha = hover ? 1 : 0.5;
  ctx.strokeStyle = '#fff';
  ctx.fillStyle = '#fff';
  ctx.lineWidth = 2;
  // Speaker body
  ctx.fillRect(-8, -5, 6, 10);
  ctx.beginPath();
  ctx.moveTo(-2, -5);
  ctx.lineTo(5, -10);
  ctx.lineTo(5, 10);
  ctx.lineTo(-2, 5);
  ctx.closePath();
  ctx.fill();
  if (muted) {
    // X through speaker
    ctx.strokeStyle = '#ff3333';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(8, -7);
    ctx.lineTo(15, 7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(15, -7);
    ctx.lineTo(8, 7);
    ctx.stroke();
  } else {
    // Sound waves
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(5, 0, 7, -0.6, 0.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(5, 0, 12, -0.5, 0.5);
    ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ffff';
  ctx.fillText('PAUSED', W / 2, H / 2 - 20);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('Press ESC to resume', W / 2, H / 2 + 20);
  ctx.fillText('Press M to ' + (muted ? 'unmute' : 'mute'), W / 2, H / 2 + 50);
}

function drawMenu() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  drawStarfield();

  // Title
  ctx.save();
  const t = performance.now() / 1000;
  const glow = 0.7 + Math.sin(t * 2) * 0.3;
  ctx.globalAlpha = glow;
  ctx.font = 'bold 56px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ffff';
  ctx.fillText('NEON SURVIVOR', W / 2, 180);
  ctx.globalAlpha = 1;

  // Subtitle
  ctx.font = '16px monospace';
  ctx.fillStyle = '#ff33ff';
  ctx.fillText('TOP-DOWN ARENA SHOOTER', W / 2, 215);

  // Start button
  const btnW = 220, btnH = 50;
  const btnX = W / 2 - btnW / 2, btnY = 280;
  const hover = mouse.x >= btnX && mouse.x <= btnX + btnW &&
                mouse.y >= btnY && mouse.y <= btnY + btnH;
  ctx.fillStyle = hover ? '#00ffff' : '#006666';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 2;
  ctx.strokeRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = hover ? '#000' : '#00ffff';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('START GAME', W / 2, btnY + 33);

  if (hover && mouse.down) {
    mouse.down = false;
    startGame();
    return;
  }

  // Controls
  ctx.font = '12px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('WASD / Arrows = Move  |  Mouse = Aim  |  Click = Shoot', W / 2, 380);

  // Leaderboard on menu
  const scores = loadHighScores();
  if (scores.length > 0) {
    drawLeaderboard(W / 2 - 150, 410, 300, 'TOP SCORES', false);
  } else {
    ctx.font = '13px monospace';
    ctx.fillStyle = '#555';
    ctx.fillText('Survive the waves!', W / 2, 440);
  }

  ctx.font = '10px monospace';
  ctx.fillStyle = '#444';
  ctx.fillText('v1.0', W / 2, H - 20);
}

function updateEnterInitials(dt) {
  inputCooldown -= dt;
  initialsBlinkTimer += dt;

  if (inputCooldown > 0) return;

  // Up/Down to change letter
  if (keys['arrowup'] || keys['w']) {
    initials[initialsCursor] = (initials[initialsCursor] + 1) % 26;
    inputCooldown = 0.12;
    playSound('enemyHit');
  }
  if (keys['arrowdown'] || keys['s']) {
    initials[initialsCursor] = (initials[initialsCursor] + 25) % 26;
    inputCooldown = 0.12;
    playSound('enemyHit');
  }
  // Left/Right to move cursor
  if (keys['arrowleft'] || keys['a']) {
    initialsCursor = Math.max(0, initialsCursor - 1);
    inputCooldown = 0.15;
  }
  if (keys['arrowright'] || keys['d']) {
    initialsCursor = Math.min(2, initialsCursor + 1);
    inputCooldown = 0.15;
  }
  // Enter to confirm
  if (keys['enter'] || keys[' ']) {
    if (initialsCursor < 2) {
      initialsCursor++;
      inputCooldown = 0.15;
    } else {
      const name = initials.map(i => ALPHABET[i]).join('');
      leaderboardScores = addHighScore(name, score, wave);
      state = 'leaderboard';
      inputCooldown = 0.5;
      playSound('waveAnnounce');
    }
  }
}

function drawEnterInitials() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffff66';
  ctx.fillText('NEW HIGH SCORE!', W / 2, 140);

  ctx.font = '20px monospace';
  ctx.fillStyle = '#ff33ff';
  ctx.fillText('SCORE: ' + score + '  WAVE: ' + wave, W / 2, 180);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('ENTER YOUR INITIALS', W / 2, 230);

  // Draw 3 letter slots
  const slotW = 50, slotH = 60, gap = 16;
  const startX = W / 2 - (slotW * 3 + gap * 2) / 2;
  const slotY = 260;

  for (let i = 0; i < 3; i++) {
    const sx = startX + i * (slotW + gap);
    const active = i === initialsCursor;

    // Slot background
    ctx.fillStyle = active ? '#1a1a4a' : '#111';
    ctx.fillRect(sx, slotY, slotW, slotH);
    ctx.strokeStyle = active ? '#00ffff' : '#333';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(sx, slotY, slotW, slotH);

    // Up arrow
    if (active) {
      ctx.fillStyle = '#00ffff';
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('\u25B2', sx + slotW / 2, slotY - 6);
      ctx.fillText('\u25BC', sx + slotW / 2, slotY + slotH + 16);
    }

    // Letter
    const blink = active && Math.floor(initialsBlinkTimer * 3) % 2 === 0;
    ctx.font = 'bold 36px monospace';
    ctx.fillStyle = blink ? '#00ffff' : '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText(ALPHABET[initials[i]], sx + slotW / 2, slotY + 43);
  }

  // Instructions
  ctx.font = '12px monospace';
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  ctx.fillText('UP/DOWN = Change Letter    LEFT/RIGHT = Move    ENTER = Confirm', W / 2, slotY + slotH + 50);
}

function drawLeaderboard(x, y, w, title, highlight) {
  const scores = highlight ? leaderboardScores : loadHighScores();

  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ffff';
  ctx.fillText(title || 'HIGH SCORES', x + w / 2, y);

  if (scores.length === 0) {
    ctx.font = '14px monospace';
    ctx.fillStyle = '#555';
    ctx.fillText('NO SCORES YET', x + w / 2, y + 40);
    return y + 60;
  }

  const rowH = 24;
  ctx.font = '14px monospace';
  for (let i = 0; i < scores.length; i++) {
    const s = scores[i];
    const ry = y + 25 + i * rowH;
    const isNew = highlight && s.initials === initials.map(j => ALPHABET[j]).join('') && s.score === score;

    // Rank
    ctx.textAlign = 'left';
    ctx.fillStyle = isNew ? '#ffff66' : (i < 3 ? '#ffaa00' : '#888');
    const rank = (i + 1) + '.';
    ctx.fillText(rank.padStart(3), x + 10, ry);

    // Initials
    ctx.fillStyle = isNew ? '#00ffff' : '#fff';
    ctx.fillText(s.initials, x + 55, ry);

    // Score
    ctx.textAlign = 'right';
    ctx.fillStyle = isNew ? '#ffff66' : '#ffff66';
    ctx.fillText(String(s.score).padStart(7), x + w - 80, ry);

    // Wave
    ctx.fillStyle = isNew ? '#aaaaff' : '#aaaaff';
    ctx.fillText('W' + s.wave, x + w - 10, ry);
  }

  return y + 25 + scores.length * rowH + 10;
}

function drawLeaderboardScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, W, H);

  const bottomY = drawLeaderboard(W / 2 - 180, 80, 360, 'HIGH SCORES', true);

  // Play again button
  const btnW = 220, btnH = 50;
  const btnX = W / 2 - btnW / 2, btnY = Math.max(bottomY + 20, 420);
  const hover = mouse.x >= btnX && mouse.x <= btnX + btnW &&
                mouse.y >= btnY && mouse.y <= btnY + btnH;
  ctx.fillStyle = hover ? '#00ffff' : '#006666';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 2;
  ctx.strokeRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = hover ? '#000' : '#00ffff';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PLAY AGAIN', W / 2, btnY + 32);

  if (hover && mouse.down) {
    mouse.down = false;
    startGame();
  }
}

function drawGameOver() {
  // Dim overlay
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff3333';
  ctx.fillText('GAME OVER', W / 2, 160);

  ctx.font = '20px monospace';
  ctx.fillStyle = '#ffff66';
  ctx.fillText('SCORE: ' + score, W / 2, 210);
  ctx.fillStyle = '#aaaaff';
  ctx.fillText('WAVE: ' + wave, W / 2, 240);

  // Show leaderboard inline
  drawLeaderboard(W / 2 - 160, 275, 320, 'HIGH SCORES', false);

  // Play again button
  const btnW = 220, btnH = 50;
  const btnX = W / 2 - btnW / 2, btnY = 510;
  const hover = mouse.x >= btnX && mouse.x <= btnX + btnW &&
                mouse.y >= btnY && mouse.y <= btnY + btnH;
  ctx.fillStyle = hover ? '#00ffff' : '#006666';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 2;
  ctx.strokeRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = hover ? '#000' : '#00ffff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('PLAY AGAIN', W / 2, btnY + 32);

  if (hover && mouse.down) {
    mouse.down = false;
    startGame();
  }
}

function drawWaveAnnouncement() {
  if (waveState === 'announcing') {
    const alpha = Math.min(1, waveTimer);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 40px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffff';
    ctx.fillText('WAVE ' + wave, W / 2, H / 2 - 10);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#ff33ff';
    ctx.fillText(enemiesInWave + ' enemies incoming', W / 2, H / 2 + 20);
    ctx.globalAlpha = 1;
  }
}

// ---- Arena grid (subtle) ----
function drawArenaGrid() {
  ctx.strokeStyle = 'rgba(30, 30, 60, 0.8)';
  ctx.lineWidth = 1;
  const gridSize = 40;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // Arena border
  ctx.strokeStyle = '#1a1a4a';
  ctx.lineWidth = 3;
  ctx.strokeRect(2, 2, W - 4, H - 4);
}

// ---- Main Loop ----
let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap delta
  lastTime = timestamp;

  if (state === 'menu') {
    updateStarfield(dt);
    drawMenu();
    drawMuteButton();
    return;
  }

  if (state === 'playing' && !paused) {
    updatePlaying(dt);
  }

  // Draw playing state (also drawn behind gameover)
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(-10, -10, W + 20, H + 20);
  drawArenaGrid();

  // Player bullets
  for (const b of playerBullets) {
    ctx.fillStyle = b.pierce ? '#33ffff' : '#ffff66';
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);
    ctx.fillRect(-3, -1.5, 8, 3);
    ctx.restore();
  }

  // Enemy bullets
  ctx.fillStyle = '#ff66ff';
  for (const b of enemyBullets) {
    ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
  }

  // Power-ups on ground
  drawPowerups();

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Player
  drawPlayer();

  // Shield visual around player
  if (hasPowerup('shield')) {
    ctx.save();
    ctx.strokeStyle = '#3399ff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4 + Math.sin(performance.now() / 200) * 0.2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 22, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Particles
  drawParticles();

  ctx.restore();

  // Damage flash overlay
  if (damageFlashTimer > 0) {
    ctx.fillStyle = 'rgba(255, 0, 0, ' + (damageFlashTimer / 0.15 * 0.3) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  // HUD (not affected by shake)
  drawHUD();
  drawActivePowerupTimers();
  drawPowerupFlash();
  drawWaveAnnouncement();

  if (state === 'playing' && paused) {
    drawPauseOverlay();
  }

  if (state === 'enterInitials') {
    updateParticles(dt);
    updateEnterInitials(dt);
    drawEnterInitials();
  }
  else if (state === 'leaderboard') {
    updateParticles(dt);
    drawLeaderboardScreen();
  }
  else if (state === 'gameover') {
    updateParticles(dt);
    drawGameOver();
  }

  drawMuteButton();
}

requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
